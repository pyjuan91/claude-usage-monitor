<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      color: #1F1E1D;
      background: #FAF9F5;
      padding: 14px 16px;
      line-height: 1.4;
    }
    @media (prefers-color-scheme: dark) {
      body { background: #2A2A2A; color: #ECECEC; }
      .row-label { color: #999; }
      .bar-track { background: #444; }
      .reset-text { color: #999; }
      .footer-text { color: #999; }
    }

    h1 {
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    h1 svg { flex-shrink: 0; }

    .row { margin-bottom: 10px; }
    .row-label {
      font-size: 11px;
      font-weight: 600;
      color: #6F6F78;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 4px;
    }
    .bar-container { display: flex; align-items: center; gap: 8px; }
    .bar-track {
      flex: 1;
      height: 6px;
      background: #E8E5DE;
      border-radius: 3px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    .bar-pct {
      font-size: 12px;
      font-weight: 600;
      min-width: 32px;
      text-align: right;
    }
    .reset-text {
      font-size: 11px;
      color: #6F6F78;
      margin-top: 2px;
    }
    .extra-text { font-weight: 500; }
    .footer-text { font-size: 10px; color: #6F6F78; margin-top: 8px; }
    .error-msg {
      text-align: center;
      padding: 16px 0;
      color: #D03E3E;
      font-size: 12px;
    }
    .loading { text-align: center; padding: 16px 0; color: #6F6F78; }
  </style>
</head>
<body>
  <h1>
    <svg width="16" height="16" viewBox="0 0 16 16" fill="#C15F3C"><path d="M8 1a7 7 0 110 14A7 7 0 018 1zm0 1.5a5.5 5.5 0 100 11 5.5 5.5 0 000-11zM8 3.75a.75.75 0 01.75.75v3.19l2.03 2.03a.75.75 0 01-1.06 1.06l-2.22-2.22a.75.75 0 01-.25-.56V4.5A.75.75 0 018 3.75z"/></svg>
    <span id="title-text">Claude Usage</span>
  </h1>
  <div id="content"><div class="loading">Loading...</div></div>
  <div class="footer-text" id="footer"></div>
  <script src="i18n.js"></script>
  <script src="utils.js"></script>
  <script src="popup.js"></script>
</body>
</html>
