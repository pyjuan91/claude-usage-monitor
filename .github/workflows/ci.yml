name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:ci

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate manifest.json is valid JSON
        run: python3 -m json.tool src/manifest.json > /dev/null
      - name: Check all referenced files exist
        run: |
          for f in src/i18n.js src/utils.js src/content.js src/popup.js src/background.js src/browser-polyfill.js src/styles.css src/popup.html; do
            if [ ! -f "$f" ]; then
              echo "Missing file: $f"
              exit 1
            fi
          done
          for icon in src/icons/icon-16.png src/icons/icon-48.png src/icons/icon-128.png; do
            if [ ! -f "$icon" ]; then
              echo "Missing icon: $icon"
              exit 1
            fi
          done
          echo "All referenced files exist."
